<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Hanvika's Story ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #ff85a1;
            --secondary: #ffb7c5;
            --glass: rgba(255, 255, 255, 0.9);
        }

        @keyframes neonCycle {
            0% { --neon: #ff85a1; --secondary: #fbb1bd; }
            33% { --neon: #f72585; --secondary: #ff85a1; }
            66% { --neon: #ff4d6d; --secondary: #ffb7c5; }
            100% { --neon: #ff85a1; --secondary: #fbb1bd; }
        }

        @keyframes tgrGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; overflow: hidden;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%); 
            animation: neonCycle 8s infinite linear;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 1; opacity: 1; pointer-events: none; }

        #lock { 
            position: fixed; inset: 0; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            backdrop-filter: blur(20px);
            background: radial-gradient(circle at center, #fff0f3 0%, #ffc2d1 100%);
            transition: opacity 1s ease;
        }

        .main-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; display: none; width: 92%; max-width: 450px; height: 85vh;
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 35px; text-align: center; overflow: hidden;
            border: 4px solid var(--neon);
            box-shadow: 0 0 25px var(--neon), inset 0 0 15px var(--secondary);
        }

        .section { 
            height: 100%; width: 100%; display: none; 
            padding: 40px 20px; 
            animation: fadeIn 0.8s ease; 
            position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .slider-container {
            position: relative; width: 100%; height: 70%;
            display: flex; align-items: center; justify-content: center;
        }

        .slide {
            position: absolute; width: 85%; height: 90%;
            opacity: 0; transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }

        .slide.active { opacity: 1; transform: scale(1); z-index: 2; }

        .slide img { 
            width: 100%; height: 100%; object-fit: cover; 
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.3);
            background: #eee;
        }

        /* FRAME TYPES */
        .frame-star::before { content: '✨'; position: absolute; top: -15px; right: -15px; font-size: 35px; z-index: 10; }
        .frame-star img { border-radius: 20px; border: 3px solid var(--neon); }

        .frame-heart::after { content: '💖'; position: absolute; bottom: -20px; font-size: 30px; z-index: 10; }
        .frame-heart img { border-radius: 50% 50% 15px 15px; border: 5px solid white; }

        .frame-bubbles img { border-radius: 30px; }
        .frame-bubbles::before { content: '🫧'; position: absolute; top: -10px; left: -15px; font-size: 40px; }

        .frame-moon img { border-radius: 150px 150px 20px 20px; border: 3px solid #ffcc33; }
        .frame-moon::after { content: '🌙'; position: absolute; top: 10px; right: 15px; font-size: 25px; }

        .frame-polaroid { background: white; padding: 10px 10px 50px 10px !important; box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; }
        .frame-polaroid::after { content: 'Happy Days ✨'; position: absolute; bottom: 15px; font-family: 'Dancing Script'; color: #ff4d6d; font-size: 22px; font-weight: bold; }

        #magicBall {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--neon));
            box-shadow: 0 0 40px var(--neon);
            font-size: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; animation: pulse 2s infinite; margin: 20px auto;
        }

        .btn {
            padding: 12px 28px; border-radius: 50px; border: none;
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white; font-weight: 800; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            text-transform: uppercase; font-size: 14px;
        }

        .neon-text { 
            font-family: 'Dancing Script'; font-size: 38px; 
            color: #f72585; text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            margin: 10px 0;
        }
        
        .chip { 
            padding: 8px 18px; border-radius: 20px; 
            border: 2px solid var(--neon); margin: 5px; 
            display: inline-block; font-size: 13px; font-weight: bold;
            color: #f72585; background: white;
        }

        .tgr-footer {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            font-size: 12px; font-weight: 800; letter-spacing: 2px;
            text-transform: uppercase;
        }
        .tgr-text {
            background: linear-gradient(to right, #f72585, #ff85a1, #fff, #ff85a1, #f72585);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: tgrGradient 3s linear infinite;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div id="lock">
        <div id="lock-card" style="text-align: center; padding: 40px; border-radius: 35px; background: rgba(255, 255, 255, 0.4); border: 2px solid #fff;">
            <h1 class="neon-text"> SURPRISE FOR HANVI</h1>
            <input type="text" id="pass" placeholder="🎀 cute little princess🎀" style="padding: 15px; border-radius: 50px; border: 1px solid #ffb7c5; width: 220px; text-align: center; outline: none; background: #fff;">
            <br><br>
            <button class="btn" onclick="unlock()">🎀 Open 🎀</button>
        </div>
    </div>

    <audio id="music" loop><source src="vig songe.mpeg" type="audio/mpeg"></audio>

    <div class="main-container" id="main">
        <div id="s1" class="section" style="display: flex; flex-direction: column; justify-content: center;">
            <h2 class="neon-text">Happy Birthday!</h2>
            <div style="font-size: 50px;">🎂</div>
            <p style="font-weight: 800; color: #ff4d6d; font-size: 22px; letter-spacing: 1px;"> 🎀 HANVIKA REDDY 🎀 </p>
        </div>

        <div id="s2" class="section">
            <h3 style="color: #f72585;">A Little Note...</h3>
            <p id="typing" style="font-size: 16px; font-weight: 600; line-height: 1.8; color: #444; margin-top: 20px; padding: 0 15px; min-height: 150px;"></p>
        </div>

        <div id="s3" class="section">
            <div id="ballView" style="height:100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <p style="color:#ff4d6d; font-weight: 600;">Tap the Magic Ball to reveal your memories</p>
                <div id="magicBall" onclick="startSlides()">🔮</div>
            </div>
            <div id="sliderView" style="display:none; height: 100%;">
                <div class="slider-container" id="slider">
                    <div class="slide active frame-star"><img src="18.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=1'"></div>
                    <div class="slide frame-heart"><img src="2.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=2'"></div>
                    <div class="slide frame-polaroid"><img src="20.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=3'"></div>
                    <div class="slide frame-bubbles"><img src="24.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=4'"></div>
                    <div class="slide frame-moon"><img src="26.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=5'"></div>
                    <div class="slide frame-star"><img src="29.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=6'"></div>
                    <div class="slide frame-heart"><img src="28.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=7'"></div>
                    <div class="slide frame-polaroid"><img src="27.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=8'"></div>
                    <div class="slide frame-bubbles"><img src="1.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=9'"></div>
                    <div class="slide frame-moon"><img src="17.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=10'"></div>
                    <div class="slide frame-star"><img src="4.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=11'"></div>
                    <div class="slide frame-heart"><img src="8.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=12'"></div>
                    <div class="slide frame-polaroid"><img src="9.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=13'"></div>
                    <div class="slide frame-bubbles"><img src="10.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=14'"></div>
                    <div class="slide frame-moon"><img src="11.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=15'"></div>
                    <div class="slide frame-star"><img src="22.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=16'"></div>
                    <div class="slide frame-heart"><img src="23.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=17'"></div>
                    <div class="slide frame-polaroid"><img src="16.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=18'"></div>
                    <div class="slide frame-bubbles"><img src="14.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=19'"></div>
                    <div class="slide frame-moon"><img src="19.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=20'"></div>
                    <div class="slide frame-star"><img src="25.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=21'"></div>
                    <div class="slide frame-heart"><img src="5.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=22'"></div>
                    <div class="slide frame-polaroid"><img src="3.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=23'"></div>
                    <div class="slide frame-bubbles"><img src="15.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=24'"></div>
                    <div class="slide frame-moon"><img src="12.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=25'"></div>
                    <div class="slide frame-star"><img src="13.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=26'"></div>
                    <div class="slide frame-heart"><img src="6.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=27'"></div>
                    <div class="slide frame-polaroid"><img src="7.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=28'"></div>
                    <div class="slide frame-bubbles"><img src="21.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=29'"></div>
            <div class="slide frame-moon"><img src="WhatsApp Image 2026-04-11 at 6.08.44 PM.jpeg" onerror="this.src='https://via.placeholder.com/300x450?text=30'"></div>

                    
                <div id="counter" style="margin-top: 10px; font-weight: 800; color: #f72585;">1 / 30</div>
                <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
                    <button class="btn" style="padding: 10px 20px; opacity: 0.7; background: #ffb7c5;" onclick="prevSlide()">Back</button>
                    <button class="btn" style="padding: 10px 20px;" onclick="nextSlide()">Next</button>
                </div>
            </div>
        </div>

        <div id="s4" class="section">
            <h2 class="neon-text">Hearty Wishes By</h2>
            <div id="wisherBox" style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center;"></div>
            <p style="margin-top: 30px; font-weight: 600; color: #666;">You are loved by everyone! ❤️</p>
            <div class="tgr-footer">designed by <span class="tgr-text"> TGR </span></div>
        </div>

        <div class="nav-btns" id="bottomNav" style="position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100;">
            <button id="mainActionBtn" class="btn" onclick="nextStep()">READ MESSAGE 💖</button>
        </div>
    </div>

    <script>
        const CODES = [""]; 
        const WISHERS = ["Ganesh", "Kanchana", "Mom & Dad", " Family"];
        const MSG = "Hanvika, you are our little princess! 💝 May your world always be filled with sparkles and stardust, and may your happy heart always stay full of joy. Keep shining like the little star you are! 💖🌟 Happy Birthday!";
        
        let currentStep = 1;
        let currentSlide = 0;
        const totalSlides = 30; 
        let autoPlayTimer;

        function unlock() {
            const val = document.getElementById("pass").value.toUpperCase();
            if(CODES.includes(val)) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("main").style.display = "block";
                document.getElementById("music").play();
            } else { 
                alert("Please enter the correct name! 🎀"); 
            }
        }

        function nextStep() {
            if (currentStep >= 4) return;
            currentStep++;
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(`s${currentStep}`);
            target.style.display = 'block';

            if(currentStep === 2) {
                document.getElementById("mainActionBtn").innerText = "Open Gallery 📸";
                type();
            } else if(currentStep === 3) {
                document.getElementById("bottomNav").style.display = "none";
            } else if(currentStep === 4) {
                document.getElementById("mainActionBtn").innerText = "Restart 🎀";
                document.getElementById("mainActionBtn").onclick = () => location.reload();
                const wBox = document.getElementById('wisherBox');
                wBox.innerHTML = "";
                WISHERS.forEach(w => {
                    const chip = document.createElement('span');
                    chip.className = 'chip'; chip.innerText = w;
                    wBox.appendChild(chip);
                });
            }
        }

        function startSlides() {
            document.getElementById('ballView').style.display = 'none';
            document.getElementById('sliderView').style.display = 'block';
            autoPlayTimer = setInterval(nextSlide, 3500);
        }

        function updateSlide() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((s, i) => {
                s.classList.toggle('active', i === currentSlide);
            });
            document.getElementById('counter').innerText = `${currentSlide + 1} / ${totalSlides}`;
        }

        function nextSlide() {
            if(currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlide();
            } else {
                clearInterval(autoPlayTimer);
                document.getElementById("bottomNav").style.display = "flex";
                document.getElementById("mainActionBtn").innerText = "View Squad 🫂";
                nextStep();
            }
        }

        function prevSlide() {
            clearInterval(autoPlayTimer);
            if(currentSlide > 0) { currentSlide--; updateSlide(); }
        }

        function type() {
            let i = 0; const el = document.getElementById("typing");
            el.innerHTML = "";
            const timer = setInterval(() => {
                el.innerHTML += MSG[i]; i++;
                if(i >= MSG.length) clearInterval(timer);
            }, 50);
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const EMOJIS = ["💖", "💗", "💓", "🌸", "✨", "🎀", "🌷", "🥰"];
        let pts = [];
        for(let i=0; i<25; i++) {
            pts.push({
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height, 
                size: Math.random() * 20 + 15, 
                speed: Math.random() * 1 + 0.5,
                emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
                opacity: Math.random() * 0.5 + 0.2
            });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.y -= p.speed;
                if(p.y < -50) p.y = canvas.height + 50;
                ctx.globalAlpha = p.opacity;
                ctx.font = `${p.size}px Arial`;
                ctx.fillText(p.emoji, p.x, p.y);
            });
            requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
